<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout 1 — Survey Form</title>
</head>
<body>

    <header>
        <h1>Survey Form</h1>
        <p>Let us know how we can improve FreeCodeCamp</p>
    </header>

    <main>
        <form>
            <!-- Name Field -->
            <div>
                <label for="name">* Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            <br>

            <!-- Email Field -->
            <div>
                <label for="email">* Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your Email" required>
            </div>
            <br>

            <!-- Age Field -->
            <div>
                <label for="age">* Age:</label>
                <input type="number" id="age" name="age" min="1" max="120" placeholder="Age">
            </div>
            <br>

            <!-- Current Role Dropdown -->
            <div>
                <label for="role">Which option best describes your current role?</label>
                <select id="role" name="role">
                    <option value="" disabled selected>Student</option>
                    <option value="student">Student</option>
                    <option value="job">Full Time Job</option>
                    <option value="learner">Full Time Learner</option>
                    <option value="prefer-not">Prefer not to say</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <br>

            <!-- Radio Buttons (Recommendation) -->
            <div>
                <label>* How likely are you to recommend FreeCodeCamp to a friend?</label><br>
                <input type="radio" id="definitely" name="recommend" value="definitely">
                <label for="definitely">Definitely</label><br>
                
                <input type="radio" id="maybe" name="recommend" value="maybe">
                <label for="maybe">Maybe</label><br>
                
                <input type="radio" id="not-sure" name="recommend" value="not-sure">
                <label for="not-sure">Not sure</label>
            </div>
            <br>

            <!-- Dropdown for Likes -->
            <div>
                <label for="likes">What do you like most in FCC?</label>
                <select id="likes" name="likes">
                    <option value="" disabled selected>Select an option</option>
                    <option value="challenges">Challenges</option>
                    <option value="projects">Projects</option>
                    <option value="community">Community</option>
                    <option value="open-source">Open Source</option>
                </select>
            </div>
            <br>

            <!-- Checkboxes (Future Improvements) -->
            <div>
                <label>Things that should be improved in the future (Check all that apply):</label><br>
                <input type="checkbox" id="front-end" name="improve" value="front-end">
                <label for="front-end">Front-end Projects</label><br>
                
                <input type="checkbox" id="back-end" name="improve" value="back-end">
                <label for="back-end">Back-end Projects</label><br>
                
                <input type="checkbox" id="data-visualization" name="improve" value="data-visualization">
                <label for="data-visualization">Data Visualization</label>
            </div>
            <br>

            <!-- Textarea for Comments -->
            <div>
                <label for="comments">Any Comments or Suggestions?</label><br>
                <textarea id="comments" name="comments" rows="5" cols="40" placeholder="Enter your comment here..."></textarea>
            </div>
            <br>

            <!-- Submit Button -->
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>

</body>
</html>
