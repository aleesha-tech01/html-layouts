<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pure HTML Survey Form</title>
</head>

<body>

    <table>
        <tr>
            <td>
                <h1>Survey Form</h1>
            </td>
        </tr>
    </table>

    <p>
        Let us know how we can improve freeCodeCamp
    </p>

    <br>

    <form>

        <table>

            <tr>

                <td>
                    <label>Name:</label>
                </td>

                <td>
                    <input type="text" placeholder="Enter your name" required>
                </td>

            </tr>

            <tr>

                <td>
                    <label>Email:</label>
                </td>

                <td>
                    <input type="email" placeholder="Enter your Email" required>
                </td>

            </tr>

            <tr>

                <td>
                    <label>Age:</label>
                </td>

                <td>
                    <input type="number" placeholder="Age">
                </td>

            </tr>

            <tr>

                <td>
                    <label>
                        Which option best describes your current role?
                    </label>
                </td>

                <td>

                    <select>

                        <option>Student</option>

                    </select>

                </td>

            </tr>

            <tr>

                <td>
                    <label>
                        How likely is that you would recommend freeCodeCamp to a friend?
                    </label>
                </td>

                <td>

                    <input type="radio" name="r">
                    Definitely

                    <br>

                    <input type="radio" name="r">
                    Maybe

                    <br>

                    <input type="radio" name="r">
                    Not sure

                </td>

            </tr>

            <tr>

                <td>
                    <label>
                        What do you like most in FCC:
                    </label>
                </td>

                <td>

                    <select>

                        <option>Select an option</option>

                    </select>

                </td>

            </tr>

            <tr>

                <td>
                    <label>
                        Things that should be improved in the future:
                    </label>
                </td>

                <td>

                    <input type="checkbox">
                    Front-end Projects

                    <br>

                    <input type="checkbox">
                    Back-end Projects

                    <br>

                    <input type="checkbox">
                    Data Visualization

                </td>

            </tr>

            <tr>

                <td></td>

                <td>

                    <br>

                    <button type="submit">
                        Submit
                    </button>

                </td>

            </tr>

        </table>

    </form>

</body>

</html>
